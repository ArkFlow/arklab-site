        <h1>隐私政策</h1>
        <p class="muted">最后更新：2026 年 6 月 20 日</p>
        <p>ArkFlow 是一个本地优先的个人资产管理 App。当前版本不提供 ArkFlow 账号系统，不运营用于保存用户资产数据的 ArkFlow 服务器，也不会把你的账户、截图、资产金额或 OCR 结果上传到 ArkFlow 服务器。</p>
        <p>ArkFlow Pro 用户主动上传、拉取或开启自动同步时，App 会把数据导出为 .arkflowbackup 文件并存入用户自己的 iCloud Drive 容器，或从该容器读取备份。该功能是文件快照备份与同步，不是实时同步或自动合并。</p>
      </article>
    </main>
  </div>
